<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş / Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container" id="container">
    <!-- Kayıt Ol Formu -->
    <div class="form-container sign-up-container">
        <form action="#">
            <h1>Hesap Oluştur</h1>
            <div class="social-container">
                <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social"><i class="fab fa-google"></i></a>
                <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <span>veya kayıt için e-postanızı kullanın</span>
            <input type="text" placeholder="İsim" />
            <input type="email" placeholder="E-posta Adresi" />
            <input type="password" placeholder="Şifre" />
            <button>KAYIT OL</button>
        </form>
    </div>
    
    <!-- Giriş Yap Formu -->
    <div class="form-container sign-in-container">
        <form action="#">
            <h1>Sign In</h1>
            <div class="social-container">
                <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social"><i class="fab fa-google"></i></a>
                <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <span>or use your account</span>
            <input type="email" placeholder="Email Address" />
            <input type="password" placeholder="Password" />
            <a href="#" class="forgot-password">Forgot your password?</a>
            <button class="sign-in-btn">SIGN IN</button>
        </form>
    </div>
    
    <!-- Hareketli Panel -->
    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel overlay-left">
                <h1>Tekrar Hoşgeldiniz!</h1>
                <p>Bizimle bağlantıda kalmak için lütfen kişisel bilgilerinizle giriş yapın</p>
                <button class="ghost" id="signIn">GİRİŞ YAP</button>
            </div>
            <div class="overlay-panel overlay-right">
                <h1>Hey There!</h1>
                <p>Begin your amazing journey by creating an account with us today</p>
                <button class="ghost" id="signUp">SIGN UP</button>
            </div>
        </div>
<script src="script.js"></script>
</body>
</html>
